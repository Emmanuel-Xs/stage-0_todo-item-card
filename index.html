<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card</title>
    <meta
      name="description"
      content="A testable, accessible, and beautiful Todo Item Card"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <article
      class="todo-card"
      data-testid="test-todo-card"
      aria-label="Todo Item Card"
    >
      <header>
        <div class="checkbox-wrapper">
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
          />

          <h2 class="todo-title">
            <label
              for="todo-complete"
              data-testid="test-todo-title"
              aria-label="Toggle task completion"
              title="Redesign The Landing Page and Hero Section"
            >
              Redesign The Landing Page and Hero Section
            </label>
          </h2>
        </div>
        <div class="header-bottom">
          <div class="todo-status-priority">
            <span
              class="todo-status pending"
              data-testid="test-todo-status"
              aria-label="Task status: Pending"
              >Pending</span
            >
            <span
              class="todo-priority medium"
              data-testid="test-todo-priority"
              aria-label="Priority: Medium"
              >Medium</span
            >
          </div>
          <div class="todo-due">
            <svg
              class="calendar-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <time
              data-testid="test-todo-due-date"
              id="due-date-display"
              datetime="2026-04-16T23:00:00Z"
            >
              Due Apr 16, 2026
            </time>
          </div>
        </div>
      </header>
      <div class="todo-body">
        <p class="todo-description" data-testid="test-todo-description">
          Revamp the main landing page to increase conversion rates. Focus on
          the hero section, clarify the value proposition, and optimize the
          call-to-action buttons for better visibility.
        </p>
        <ul class="todo-tags" data-testid="test-todo-tags">
          <li data-testid="test-todo-tag-work" class="todo-tag">work</li>
          <li data-testid="test-todo-tag-urgent" class="todo-tag">urgent</li>
          <li class="todo-tag">design</li>
        </ul>
      </div>
      <footer class="todo-footer">
        <div class="time-remaining-wrapper">
          <svg
            class="clock-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <time
            class="time-remaining"
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            aria-label="Time remaining"
            >Calculating...</time
          >
        </div>

        <div class="edit-buttons">
          <button class="edit-btn" data-testid="test-todo-edit-button">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              ></path>
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              ></path>
            </svg>
            Edit
          </button>
          <button class="delete-btn" data-testid="test-todo-delete-button">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path
                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              ></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
            Delete
          </button>
        </div>
      </footer>
    </article>
    <script src="script.js"></script>
  </body>
</html>
